<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PhoneSober Support & Feedback</title>
  <style>
    /* 统一视觉风格 */
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
      line-height: 1.7; 
      color: #333; 
      max-width: 560px; 
      margin: 0 auto; 
      padding: 60px 24px; 
      background-color: #fcfcfd;
    }

    .container {
      background: white;
      padding: 40px 32px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.04);
      text-align: center;
    }

    h1 { 
      font-size: 1.5rem; 
      margin-top: 0; 
      color: #1a1a1a;
      margin-bottom: 24px;
    }

    p { 
      margin: 1em 0; 
      color: #555;
      font-size: 15px;
    }

    /* 醒目的邮件链接按钮感 */
    .email-box {
      margin: 32px 0;
      padding: 16px;
      background-color: #f3f0ff;
      border-radius: 12px;
      display: inline-block;
      min-width: 240px;
    }

    .email-box strong {
      display: block;
      color: #6c5ce7;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    a { 
      color: #6c5ce7; 
      text-decoration: none; 
      font-weight: 600;
      font-size: 17px;
    }

    a:hover {
      text-decoration: underline;
    }

    /* 页脚逻辑 */
    .footer { 
      margin-top: 60px; 
      padding-top: 20px; 
      border-top: 1px solid #eee; 
      text-align: center; 
      font-size: 12px; 
      color: #a0a0a0;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Support & Feedback</h1>
    <p>If you have any questions, suggestions, or need help with PhoneSober, our team is here to listen.</p>
    
    <div class="email-box">
      <strong>Official Email</strong>
      <a href="mailto:fufusabrina@fanglingcm.cn">fufusabrina@fanglingcm.cn</a>
    </div>

    <p>We typically respond within 24–48 hours.<br>Your feedback helps us build a better tool for focus.</p>
  </div>

  <div class="footer">
    © 2026 PhoneSober. All rights reserved.
  </div>
</body>
</html>
